<!doctype html>
<!-- 
  HTML 태그가 아니라, 브라우저(파서)에게 이 문서의 형식을 알려주는 '문서 형식 선언'
  "이 문서는 최신 표준인 HTML5로 작성되었으니, 렌더링 엔진아 딴소리 말고 이 기준에 맞춰서 화면에 뿌려라"라고 확실하게 못 박는 역할
  무조건 문서의 맨 첫 줄(최상단)에 위치해야 함
-->

<html lang="ko">
  <!-- 
    DOM 트리 구조에서 최상위(Root) 노드. 모든 HTML 태그들을 품고 있는 왕부모님임 
    lang="ko" 속성은 이 페이지의 메인 언어가 한국어라는 걸 명시함 <- 이걸 달아둬야 시각장애인용 스크린 리더기가 한국어로 자연스럽게 읽어주고, 구글 봇 같은 검색 엔진도 "아, 한국어 타겟 문서구나" 하고 정확하게 색인(SEO)해 줌 
  -->

  <head>
    <!-- 
      사용자 눈(브라우저 화면)에는 직접적으로 보이지 않는 백스테이지 같은 영역
      문서의 기본 정보(메타데이터), 검색 엔진 최적화(SEO) 세팅, 외부에서 끌어다 쓸 CSS/JS 파일 연결 등 사이트의 전반적인 환경 설정을 여기서 다 함
    -->

    <meta charset="UTF-8" />
    <!-- 
      문자 인코딩 설정
      UTF-8은 전 세계 거의 모든 문자를 표현할 수 있는 만능 키
      이거 안 넣으면 웹페이지 띄웠을 때 한글이 '뷁뛝'처럼 와장창 깨져서 나오는 대참사가 발생함 
    -->

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- 
      스마트폰, 태블릿 등 접속하는 기기의 화면 너비(device-width)에 맞춰서 웹페이지 기본 비율(1.0)을 알아서 맞추라는 뜻
      모바일에서도 예쁘게 보이는 '반응형 웹'을 만들 때 절대 빠지면 안 되는 필수 세팅임 
    -->

    <title>HTML 기본 구조</title>
    <!-- 
      웹 브라우저 맨 위쪽 탭에 뜨는 문서의 제목
      사용자가 즐겨찾기(북마크)할 때 저장되는 기본 이름이자, 구글이나 네이버 검색 결과에서 제일 크고 파랗게 뜨는 제목이라 클릭률과 SEO 관점에서 중요함
    -->

    <link rel="stylesheet" href="style.css" />
    <!-- 
      외부 리소스를 현재 문서와 연결할 때 쓰는 태그
      가장 대표적으로 HTML이라는 뼈대에 예쁘게 디자인을 입히기 위해 외부의 CSS(스타일시트) 파일을 끌어올 때 씀
    -->

    <script src="ui-script.js" defer></script>
    <!-- 
      웹페이지가 동적으로 움직이게 하는 자바스크립트(JS) 코드를 불러오거나 내부에 직접 작성할 때 씀
      head 안에서 외부 JS를 부를 땐 'defer' 속성을 꼭 써주는 게 트렌드임
      그래야 브라우저가 HTML 뼈대를 그리는 작업(파싱)을 중간에 멈추지 않고 끝까지 완료한 뒤에 안전하게 JS를 실행함
    -->
  </head>

  <body>
    <!-- 
      사용자가 모니터나 스마트폰 화면으로 실제로 보게 되는 모든 시각적 콘텐츠가 들어가는 진짜 본문 영역
      UI/UX 레이아웃, 텍스트, 이미지, 버튼 등 눈에 보이는 요소는 다 여기 안에 들어간다고 보면 됨
    -->

    <h1>HTML 기본 구조</h1>
    <p>여기서부터 사용자 인터페이스(UI)가 실제로 화면에 렌더링 돼요.</p>
  </body>
</html>

<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>링크 태그(a)</title>
  </head>

  <body>
    <!-- 
      a 태그 (Anchor)
      웹페이지를 다른 곳으로 연결해주는 '링크'를 만듦
      span처럼 인라인(Inline) 요소라서 가로로 쭉쭉 이어짐
      어디로 갈지 목적지를 정해주는 href 속성이랑 무조건 한 세트임! 
    -->

    <a href="https://www.uzu-dev.kr">UZU Dev</a>
    <!--
      1. 외부 링크 (절대 경로)
      http:// 나 https:// 로 시작하는 완전한 주소를 적으면 외부 사이트로 이동함
    -->

    <a href="mailto:uzulab.studio@gmail.com">uzulab.studio@gmail.com</a>
    <!-- 
      2. 이메일 링크
      href 안에 mailto: 를 붙이고 이메일을 적으면, 클릭 시 아웃룩이나 메일 앱이 자동으로 켜짐
      (tel:010-1234-5678 이라고 쓰면 모바일에서 클릭 시 전화 걸기 창이 바로 뜸!) 
    -->

    <a href="./01_html-structure-guide.html">html 기본 구조 설명 보러 가기</a>
    <!-- 
      3. 내부 파일/페이지 링크 (상대 경로)
      ./ 은 '현재 파일이 있는 같은 폴더'라는 뜻임
      내 프로젝트 안에 있는 다른 HTML이나 파일로 이동할 때 씀
    -->

    <a href="#section1">어디로 갈까나~</a>
    <!-- 
      4. 페이지 내 점프 (해시 링크)
      href에 #아이디 를 적어두면, 클릭했을 때 현재 페이지 안에서 해당 id 속성을 가진 태그 위치로 스크롤이 휙! 이동함 
    -->

    <!-- 
      =========================
      잘못된 예시
      ========================= 
    -->

    <!-- 1. a 태그 안에 또 a 태그 넣기 -->
    <a href="https://google.com"> 여기를 클릭하면 <a href="https://naver.com">네이버</a>로 갑니다. </a>
    <!--
      문법 파괴의 지름길임
      링크 안에 또 링크를 넣으면 브라우저가 어디로 가야 할지 몰라서 고장 남
    -->

    <!-- 
      =========================
      올바른 예시 
      ========================= 
    -->

    <!-- 
      새 창(새 탭)에서 링크 열기
      외부 사이트로 보낼 때, 내 사이트가 꺼지는 게 싫다면 target="_blank" 속성을 무조건 추가하기
    -->

    <a href="https://www.uzu-dev.kr" target="_blank">새 창에서 열기</a>

    <!-- (공간 띄우기용 CSS를 썼다고 가정) -->
    <div style="height: 1500px">여기서부터 저 밑에 section1까지 엄청난 여백이 있음...</div>

    <p id="section1">여기로 왔지롱!</p>
    <!-- 
      위에서 #section1 링크를 누르면, 브라우저가 이 id="section1"을 가진 p 태그 위치로 스크롤을 딱 맞춰서 내려줌
    -->
  </body>
</html>

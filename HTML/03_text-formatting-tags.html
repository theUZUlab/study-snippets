<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>문단, 줄바꿈, 구분선 태그</title>
  </head>

  <body>
    <!-- 
      p, br, hr 태그는 텍스트를 구조화하고 문맥을 나누는 데 쓰는 기본 중의 기본 태그임. 
    -->

    <p>문단입니다.</p>
    <!-- 
      p 태그 (Paragraph)
      글의 '한 문단'을 정의할 때 씀
      얘는 '블록(Block) 요소'라서 텍스트가 짧아도 무조건 가로 한 줄을 자기 혼자 통째로 다 차지함. (다음 글자는 자동으로 아랫줄로 밀려남) 
    -->

    <p>
      주소는 제주시 ~~길 ##이고, <br />
      해당 주소는 저희 집 주소입니다.
    </p>
    <!-- 
      br 태그 (Break)
      키보드의 엔터(Enter) 키 역할임
      닫는 태그 없이 단독으로 씀 (<br> 또는 <br /> 둘 다 맞음)
      오직 '하나의 문단(p)' 안에서 줄을 바꿀 때만 써야 함. 
    -->

    <p>국어 내용</p>
    <hr />
    <p>수학 내용</p>
    <!-- 
      hr 태그 (Horizontal Rule)
      가로선을 그어주는 태그
      얘도 닫는 태그 없음
      중요한 건 단순히 '예쁜 선 긋기' 용도가 아님. 국어 얘기하다가 수학 얘기로 넘어가는 것처럼 문서의 '주제가 완전히 전환될 때' 의미를 나누기 위해 쓰는 거임. 
    -->

    <!-- 
      =========================
      잘못된 예시
      ========================= 
    -->

    <!-- 1. 요소 사이의 간격(여백) 넓히려고 br 남발하기 -->
    <p>첫 번째 문단입니다.</p>
    <br /><br /><br /><br />
    <p>두 번째 문단입니다.</p>
    <!-- 
      엔터 여러 번 치고 싶다고 br을 남발하면 절대 안 됨! 웹 접근성도 깨지고 코드가 지저분해짐
      디자인적인 '여백'은 무조건 CSS(margin, padding)로 띄우는 게 정석 
    -->

    <!-- 2. 그냥 예쁜 밑줄 긋고 싶어서 hr 쓰기 -->
    <h1>제목</h1>
    <hr />
    <p>내용 어쩌고 저쩌고...</p>
    <!-- 
      주제가 바뀌는 게 아니라, 그냥 제목 아래에 디자인으로 선을 긋고 싶을 땐 hr을 쓰면 안 됨
      이럴 땐 CSS로 제목 태그에 border-bottom(아래 테두리) 속성을 주는 게 맞음
    -->

    <!-- 
      =========================
      올바른 예시
      ========================= 
    -->

    <!-- 
      문단은 p로 묶고, 문단 내 줄바꿈만 br 한 번 쓰기
      주제가 아예 바뀔 때만 hr로 나누기
    -->

    <p>
      안녕하세요.<br />
      저는 프론트엔드 개발자입니다.
    </p>
    <hr />
    <p>여기서부터는 제 포트폴리오 프로젝트를 소개하겠습니다.</p>
  </body>
</html>

<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>목록 태그(ul, ol, li)</title>
  </head>

  <body>
    <!-- 
      가장 중요한 대원칙: ul과 ol의 직계 자식은 '무조건' li만 올 수 있고, li는 부모 없이 단독으로 쓸 수 없음
    -->

    <ol>
      <!-- 
      ol (Ordered List). 1, 2, 3.. 처럼 '순서가 중요한' 목록을 만들 때 씀
      (예: 회원가입 단계, 요리 순서) 
    -->
      <li>물 틀기</li>
      <li>손에 물 묻히기</li>
      <li>비누 칠하기</li>
    </ol>

    <ul>
      <!-- 
      ul (Unordered List)
      장바구니나 메뉴처럼 순서가 딱히 상관없는 목록에 씀
    -->
      <li>국어</li>
      <li>수학</li>
      <li>사회</li>
    </ul>

    <ul>
      <!-- 
      목록 안의 목록 (중첩 사용)
      대분류 안에 소분류를 넣고 싶을 땐 무조건 'li 태그 안'에 새로운 ul이나 ol을 열어야 함
    -->
      <li>
        국어
        <ul>
          <li>소설</li>
          <li>고전시가</li>
        </ul>
      </li>
      <li>수학</li>
    </ul>

    <!-- 
      =========================
      잘못된 예시
      ========================= 
    -->

    <!-- 1. ul/ol 안에 li 말고 다른 태그 냅다 넣기 -->
    <ul>
      <h3>과목 목록</h3>
      <li>국어</li>
    </ul>
    <!-- 
      ul이나 ol 바로 밑에는 무조건 li만 와야 함
      h3나 p 같은 태그가 직계 자식으로 들어오면 문법 오류임
      (제목은 ul 바깥으로 빼야 함) 
    -->

    <!-- 2. li 태그 혼자 떠돌아다니기 -->
    <li>사과</li>
    <li>바나나</li>
    <!-- 
      li는 부모(ul이나 ol) 없이 단독으로 쓰면 안 됨 
    -->

    <!-- 3. 중첩 목록 위치 틀리기 (가장 많이 하는 실수!) -->
    <ul>
      <li>국어</li>
      <ul>
        <li>소설</li>
      </ul>
    </ul>
    <!-- 
      새로운 ul을 li 밖으로 빼버리면 안 됨! 
      반드시 부모가 되는 li 태그 '안(종료 태그 </li>가 닫히기 전)'에 품어야 함
    -->

    <!-- 
      =========================
      올바른 예시
      ========================= 
    -->

    <!-- 메뉴 구조나 트리 구조 짤 때 아주 정석적인 형태 -->
    <ul>
      <li>
        프론트엔드
        <ol>
          <li>HTML</li>
          <li>CSS</li>
          <li>JS</li>
        </ol>
      </li>
    </ul>
  </body>
</html>

<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>제목 태그</title>
  </head>

  <body>
    <!-- 
      h1~h6는 문서의 '목차(뼈대)'를 잡는 태그
      숫자가 작을수록 핵심 주제를 뜻함
      글씨 크기를 키우거나 굵게 하려는 '디자인 목적'으로 쓰면 절대 안 됨
    -->

    <h1>국어</h1>
    <!-- 
      대주제
      검색 로봇이 이 페이지가 뭘 말하는지 파악할 때 제일 중요하게 보는 간판이니까, 1페이지당 1개만 쓰는 게 SEO(검색최적화)의 핵심 
    -->

    <h2>고전시</h2>
    <!-- 
      중주제
      h1 아래에 속하는 큰 단원 느낌
    -->

    <h3>어떤걸</h3>
    <!-- 
      소주제
      h2 아래에 속하는 세부 챕터
    -->

    <h2>소설</h2>
    <!-- 
      다시 새로운 중주제 시작
      이렇게 들여쓰기하듯 순서대로 계층을 내려가는 게 가장 완벽한 뼈대임
    -->

    <!-- 
      =========================
      잘못된 예시
      ========================= 
    -->

    <!-- 1. 대주제(h1) 남발하기 -->
    <h1>제목 1</h1>
    <h1>제목 2</h1>
    <!-- 
      간판이 여러 개면 구글 로봇이 "그래서 이 페이지 진짜 메인 주제가 뭐임?" 하고 헷갈려해서 검색 노출 순위가 깎임 
    -->

    <!-- 2. 계층 순서 건너뛰기 -->
    <h1>제목 1</h1>
    <h4>제목 4</h4>
    <!-- 
      대단원 다음에 바로 초소단원이 나오면 논리 구조가 박살남
      화면을 못 보고 소리로만 듣는 시각장애인(스크린 리더기 사용자)들은 중간 내용이 통째로 날아갔다고 오해함
    -->

    <!-- 3. 폰트 작게 하려고 아무 태그나 쓰기 -->
    <h2>고전시</h2>
    <h5>향가</h5>
    <!-- 
      중주제 다음 소주제라 논리상 h3를 써야 하는데, 단지 글씨를 작게 만들고 싶어서 h5를 써버리면 웹 접근성 점수 똥망  
    -->

    <!-- 
      =========================
      올바른 예시 (권장)
      ========================= 
    -->

    <!-- 
      순서대로 예쁘게 내려가기
      (참고로 내려갈 땐 한 계단씩 순서대로 가야 하지만, 새로운 큰 주제로 '올라올 땐' 여러 단계 건너뛰어도 괜춘!) 
    -->

    <h1>국어</h1>
    <h2>고전시</h2>
    <h3>향가</h3>
    <h2>소설</h2>
  </body>
</html>

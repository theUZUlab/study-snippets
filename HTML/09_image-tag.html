<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>이미지 태그(img)</title>
  </head>

  <body>
    <!-- 
      img 태그
      웹페이지에 이미지를 띄울 때 씀
      p 태그(<p>내용</p>)처럼 열고 닫는 세트가 아니라, 안에 텍스트를 품을 수 없는 '빈 요소(Void Element)'임
      그래서 끝에 슬래시를 넣어서 <img /> 형태로 스스로 닫아버림 
      (HTML5에선 슬래시 생략하고 <img>만 써도 되긴 하지만, 실무에선 리액트(React) 같은 프레임워크를 쓸 때 닫는 걸 엄격하게 따지므로 <img /> 습관을 들이는 게 짱임) 
    -->

    <img src="https://img.asiatoday.co.kr/~~~.jpg" alt="사과하다는 있는데, 왜 수박하다는 없을까?" />
    <!-- 
      1. src (Source) : 이미지 주소 (절대 경로)
      위 예시처럼 http:// 로 시작하는 '절대 경로(URL)'를 넣으면, 남의 서버나 클라우드에 있는 이미지를 내 웹사이트로 끌고 와서 보여줌 
    -->

    <img src="./09_example-image.jpg" alt="사과하다는 있는데, 왜 수박하다는 없을까?" />
    <!-- 
      2. 상대 경로 (내 파일 불러오기)
      ./ 은 '현재 내 파일이랑 같은 폴더'라는 뜻임
      내가 직접 프로젝트 폴더에 넣어둔 이미지를 불러올 때 씀 
    -->

    <!-- 3. alt (Alternative Text)
      이미지 링크가 깨졌거나 엑스박스가 뜰 때 대신 보여주는 '대체 텍스트'임
      시각장애인용 스크린 리더기는 이미지를 볼 수 없으니 이 alt 값을 소리로 읽어줌
      구글 검색 로봇(SEO)도 이 alt 텍스트를 읽고 "아, 이런 이미지구나" 하고 파악함
      무조건, 무조건 적어야 함! 
    -->

    <!-- 
      =========================
      잘못된 예시 
      ========================= 
    -->

    <!-- 1. 귀찮다고 alt 속성 아예 빼먹기 -->
    <img src="./my-photo.jpg" />
    <!-- 
      웹 접근성(Accessibility) 검사하면 0점 나옴
      스크린 리더기가 그냥 "이미지"라고만 읽고 넘어가버려서 시각장애인은 이 이미지가 뭔지 아예 정보를 얻을 수 없음
      (만약 디자인 용도로만 쓴, 진짜 아무 의미 없는 배경 이미지라면 차라리 alt="" 처럼 빈 값이라도 적어둬야 스크린 리더기가 무시하고 넘어감) 
    -->

    <!-- 2. alt에 불필요한 단어 넣기 -->
    <img src="./dog.jpg" alt="귀여운 강아지 사진 파일" />
    <!-- 
      스크린 리더기가 알아서 "~~이미지입니다"라고 읽어주기 때문에, alt 속성 안에 '이미지', '사진' 같은 단어를 굳이 또 쓸 필요 없음
      그냥 "귀여운 강아지"라고만 팩트만 적는 게 정석임
    -->
  </body>
</html>

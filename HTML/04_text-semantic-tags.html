<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>텍스트 강조 및 의미부여 태그</title>
  </head>

  <body>
    <!-- 
      여기 나오는 태그들은 단순히 폰트 스타일을 바꾸는 게 아님
      검색 로봇과 스크린 리더기에게 텍스트의 '진짜 역할'을 알려주는 용도임
    -->

    <p><strong>주의:</strong> 프로젝트 마감 기한을 반드시 엄수하세요.</p>
    <!-- 
      strong 태그
      문장 내에서 '매우 중요한 부분(경고, 심각성, 주의사항)'을 나타냄
      단순히 글씨만 굵어지는 게 아니라, 시각장애인용 리더기가 읽을 때 실제로 억양을 빡! 강하게 읽어줌
    -->

    <p>이 서비스는 <em>반응형 웹</em> 기술을 사용하여 제작되었습니다.</p>
    <!-- 
      em 태그 (Emphasis)
      문맥상 특정 단어를 강조하거나 뉘앙스 변화를 줄 때 씀
    -->

    <p>찾으시는 검색어 <mark>HTML</mark> 관련 게시글입니다.</p>
    <!-- 
      mark 태그
      형광펜 칠한 것처럼 '주의 환기'가 필요하거나 사용자가 입력한 '검색어'를 하이라이팅해서 보여줄 때 씀
    -->

    <p><small>본 게시물의 저작권은 UZU Dev에 있습니다.</small></p>
    <!-- 
      small 태그
      저작권 표기, 법적 고지(면책조항), 덧붙이는 말 등 메인 본문보다는 덜 중요한 '부가 정보(Fine print)'를 표현할 때 씀
    -->

    <p>오늘의 할인 가격: <del>50,000원</del> <ins>35,000원</ins></p>
    <!-- 
      del 태그: 삭제된 내용(취소선). 가격이 바뀌었거나 문서가 수정되었을 때 씀
      ins 태그: 삭제된 텍스트 대신 새로 추가된 내용(밑줄). del이랑 짝꿍으로 자주 묶어 씀
    -->

    <!-- 
      =========================
      잘못된 예시
      ========================= 
    -->

    <!-- 그냥 글씨를 굵게/기울이게 하고 싶어서 strong, em 쓰기 -->
    <p>저는 <strong>바닐라 라떼</strong>를 <em>좋아합니다</em>.</p>
    <!-- 
      의미상 하나도 안 중요한데 그냥 디자인 예쁘게 하려고 쓰면 절대 안 됨 
      단순히 시각적인 굵기나 기울임만 필요하다면 <b>, <i> 태그를 쓰거나 CSS(font-weight 등)로 처리하는 게 정석임
    -->

    <!-- 
      =========================
      올바른 예시
      ========================= 
    -->

    <!-- 진짜 의미나 경고가 필요할 때만 골라 쓰기 -->
    <p>
      비밀번호는 <mark>영문+숫자</mark> 조합이어야 하며,
      <strong>절대 타인에게 공유하지 마세요.</strong>
    </p>
  </body>
</html>

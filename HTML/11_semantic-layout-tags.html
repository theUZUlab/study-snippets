<!doctype html>
<html lang="ko-KR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>시맨틱(Semantic) 레이아웃 태그</title>
  </head>

  <body>
    <!-- 
      아래 태그들은 전부 <div>와 기능은 똑같지만, '의미(이름표)'가 붙어있는 시맨틱 컨테이너들임
    -->

    <header>
      <!-- 
        헤더. 페이지 최상단에서 로고, 사이트명, 검색창 등을 감싸는 간판 역할
      -->

      <h1>사이트 이름</h1>

      <nav>
        <!-- 
          네비게이션. 흔히 말하는 '메뉴바'
          다른 페이지로 넘어가는 주요 링크들을 묶어둠. 한 페이지에 여러 번 쓸 수 있음 (상단 메뉴, 하단 메뉴)
        -->
        <ul>
          <li><a href="/">HOME</a></li>
          <li>Projects</li>
          <li>Blogs</li>
        </ul>
      </nav>
    </header>

    <main>
      <!-- 
        메인. 이 페이지의 '진짜 핵심' 콘텐츠가 들어가는 주인공 영역
        가장 중요한 규칙: 문서당 무조건 딱 1번만 써야 함! 보통 body 태그의 직계 자식으로 둠
      -->

      <div>
        <!-- 
          아무 의미 없는 깡통 태그
          오직 CSS로 디자인(배경색, 레이아웃 묶기 등)을 입히기 위한 용도로만 써야 함
        -->
        <p>하이?</p>
      </div>

      <section>
        <!-- 
          섹션. 연관된 내용들을 하나로 묶어주는 '주제별 구역'
          책의 '단원' 같은 거라서 내부에 제목 태그(h2~h6)를 하나씩 꼭 넣어주는 게 정석임
        -->

        <article>
          <!-- 
            아티클. 독립적으로 뚝 떼어내서 다른 사이트나 SNS에 그대로 배포해도 내용이 완벽하게 이해되는 '독립적인 콘텐츠' 영역
            (예: 블로그 포스팅 글 1개, 뉴스 기사 1개, 사용자가 쓴 댓글 1개) 
          -->
        </article>
      </section>

      <aside>
        <!-- 
          어사이드. 본문 핵심 내용과는 살짝 빗겨난 부가 정보 영역
          (예: 오른쪽 사이드바, 배너 광고, 추천 글 목록 등) 
        -->
      </aside>
    </main>

    <footer>
      <!-- 
        푸터. 웹페이지 맨 밑바닥 영역
        저작권(Copyright), 만든 사람, 이메일, 사업자 등록번호, 관련 링크 등을 몰아넣음
      -->
    </footer>

    <!-- 
      =========================
      자주 헷갈리는 것들
      ========================= 
    -->

    <!-- 1. main 태그 두 번 쓰기 (절대 금지) -->
    <main>핵심 내용 1</main>
    <main>핵심 내용 2</main>
    <!-- 
      main은 문서의 유일한 주인공임 
      두 번 이상 쓰면 검색 로봇이 "그래서 메인이 뭔데?" 하고 화냄
    -->

    <!-- 2. section과 article 헷갈리기 -->
    <article>
      <h2>오늘의 일기</h2>
      <p>코딩은 재밌다.</p>
    </article>
    <!-- 
      이 일기장 글은 뚝 떼어서 다른 데 갖다 놔도 말이 됨 -> article (O) 
    -->

    <section>
      <h2>최신 글 모음</h2>
      <!-- (여기에 아티클 여러 개가 들어감) -->
    </section>
    <!-- 
      이건 그냥 글들을 묶어두는 '껍데기 구역'임. 이 껍데기만 떼어내서 배포하진 않음 -> section (O) 
    -->
  </body>
</html>

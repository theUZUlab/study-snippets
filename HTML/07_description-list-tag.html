<!doctype html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>정의형 목록 태그(dl, dt, dd)</title>
    </head>

    <body>
    <!-- 
      dl, dt, dd는 사전처럼 '단어(용어)'와 '그 뜻(설명)'을 짝지어줄 때 쓰는 영혼의 세트 메뉴임
    -->

    <dl>
    <!-- 
      dl (Description List)
      사전 전체를 감싸는 겉표지 역할임 
      이 안에는 기본적으로 dt와 dd만 들어올 수 있음 (최신 HTML5에서는 div로 그룹 묶는 것도 허용하긴 하지만, 기본은 dt/dd임)
    -->

        <dt>사과하다.</dt>
        <!-- 
          dt (Description Term)
          우리가 정의할 '용어'나 '단어'의 이름
        -->

        <dd>자기의 잘못을 인정하고 용서를 비는 것이다.</dd>
        <!-- 
          dd (Description Details)
          그 단어에 대한 '상세한 설명'
          기본적으로 화면에서 살짝 들여쓰기(Indent)가 돼서 보임
        -->

        <dt>프론트엔드</dt>
        <dd>사용자 눈에 보이는 웹 화면을 만드는 기술 분야이다.</dd>
        <dd>대표적으로 HTML, CSS, JavaScript가 있다.</dd>
        <!-- 
          이런 식으로 하나의 단어(dt)에 여러 개의 설명(dd)을 달아도 완전 정상이고 훌륭한 마크업임! 
        -->


    <!-- 
      =========================
      잘못된 예시 (절대 금지)
      =========================
    -->
    
    <!-- 1. dl 안에 뜬금없는 태그 냅다 넣기 -->
    <dl>
        <h2>웹 용어 사전</h2>
        <dt>HTML</dt>
        <dd>뼈대 잡는 마크업 언어</dd>
    </dl>
    <!-- 
      dl 바로 밑에는 제목(h2)이나 문단(p)이 들어오면 안 됨
      제목은 반드시 dl 바깥으로 빼서 써야 함
    -->

    <!-- 2. 짝꿍 없이 혼자 덩그러니 쓰기 -->
    <dt>CSS</dt>
    <dd>디자인하는 언어</dd>
    <!-- 
      dl로 감싸지 않고 dt랑 dd만 밖에서 쓰면 문법 파괴임
      쟤네는 무조건 dl이라는 울타리 안에서만 살 수 있음
    -->


    <!-- 
      =========================
      올바른 예시 
      ========================= 
    -->

    <!-- 
      단어 사전뿐만 아니라, 쇼핑몰 Q&A(질문과 답변) 게시판 같은 거 만들 때도 이 태그를 쓰면 검색엔진이 "아~ 질문과 답변이 짝지어져 있구나" 하고 찰떡같이 알아먹음 
    -->
    
    <dl>
        <dt>Q. 배송은 보통 얼마나 걸리나요?</dt>
        <dd>A. 평일 기준 2~3일 정도 소요됩니다.</dd>
        
        <dt>Q. 교환/환불 배송비는 얼마인가요?</dt>
        <dd>A. 단순 변심의 경우 왕복 5,000원입니다.</dd>
    </dl>

    </body>
</html>

<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>인라인 태그(span)</title>
  </head>

  <body>
    <!-- 
      span 태그는 p나 h1처럼 자체적인 '의미'나 '역할'이 1도 없는 순수 100% '깡통' 태그임
      '인라인(Inline)' 요소라서 p 태그와 달리 줄바꿈이 일어나지 않고, 딱 자기 글자 크기만큼만 가로 공간을 차지함
    -->

    <span>내용</span>
    <!-- 
      아무 의미가 없기 때문에 오직 "특정 문장이나 단어에만 콕 집어서 디자인(CSS)을 주고 싶을 때" 포장지처럼 씌우는 용도로 씀 
    -->

    <p>
      안녕하세요? 반갑습니다. 한라대 인공지능학과
      <span style="color: blue; font-weight: bold">장유주</span>입니다.
    </p>
    <!-- 
      이런 식으로 문장 중간에 있는 특정 단어만 색깔을 바꾸거나 폰트를 다르게 하고 싶을 때 span으로 감싸고 CSS를 먹여주는 게 정석임
    -->

    <!-- 
      =========================
      잘못된 예시 (절대 금지)
      ========================= 
    -->

    <!-- 1. 블록(Block) 요소 자리에 인라인(span) 남발하기 -->
    <span>첫 번째 문단입니다.</span>
    <span>두 번째 문단입니다.</span>
    <!-- 
      span은 줄바꿈이 안 되기 때문에 저렇게 쓰면 가로로 다닥다닥 다 붙어서 나옴
      문단을 나눌 땐 무조건 p 태그나 div 같은 블록 요소를 써야 함
    -->

    <!-- 2. 진짜 '의미 부여'가 필요한 곳에 span 쓰기 -->
    <p><span style="color: red">경고:</span> 비밀번호가 틀렸습니다.</p>
    <!-- 
      빨간색으로 칠했으니 눈에는 잘 띄겠지만, 시각장애인용 스크린 리더기는 이게 경고인지 모르고 그냥 평범하게 읽고 지나감
      진짜 의미상 중요한 내용이라면 span이 아니라 <strong>이나 <em> 같은 시맨틱 태그를 써야 맞음
    -->

    <!-- 
      =========================
      올바른 예시 (권장)
      ========================= 
    -->

    <!-- 아무런 의미 부여 없이 오로지 '디자인'만 부분적으로 입히고 싶을 때 사용! -->

    <p>
      UZU Tick 타이머의 남은 시간은
      <span class="timer-text">05:30</span>
      입니다.
    </p>
  </body>
</html>

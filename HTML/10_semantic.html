<!doctype html>
<html lang="ko-KR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>시맨틱 웹(Semantic Web)</title>
  </head>

  <body>
    <!-- 
      =========================
      시맨틱(Semantic) 웹이란?
      =========================
      '의미'라는 뜻의 Semantic
      즉, 태그의 '이름'만 봐도 이 태그가 웹페이지에서 어떤 '역할'을 하는지 직관적으로 알 수 있도록, 의미가 담긴 태그들로 뼈대를 짜는 것을 말함 
    -->

    <!-- 
      =========================
      시맨틱 웹이 왜 필수일까? 
      =========================
    
      1. 검색 엔진 최적화 (SEO)
      컴퓨터(구글/네이버 로봇)가 내 사이트를 훑고 갈 때 "아, 여긴 <header>고 저긴 <main>이네! <main> 안의 내용이 진짜 중요하겠군!" 하고 문맥의 중요도를 찰떡같이 파악해서 검색 상위에 노출시켜 줌

      2. 뛰어난 유지보수성 (개발자 협업)
      코드를 열었을 때 온통 <div> 천지면 여기가 메뉴인지 본문인지 찾다가 시간 다 감 하지만 <nav>, <footer> 같은 태그로 구역이 나뉘어 있으면 다른 개발자가 내 코드를 봐도 구조를 바로 이해할 수 있음

      3. 웹 접근성 (시각장애인 배려)
      시각장애인들이 사용하는 스크린 리더기가 문서를 탐색할 때, 시맨틱 태그로 구역이 명확하게 나뉘어 있으면 훨씬 더 논리적인 순서로 정확하게 내용을 읽어줄 수 있음 (img 태그에 alt 텍스트를 적어주는 것도 같은 맥락의 배려임!) 
    -->

    <!-- 
      =========================
      잘못된 예시 (div 지옥)
      =========================
      기능상으론 돌아가지만, 아무런 '의미'가 없는 깡통 태그(div)만 도배해서 뼈대를 잡은 나쁜 예시 
      로봇도 스크린 리더기도 이 구역이 대체 뭘 하는 구역인지 알 길이 없음 
    -->

    <div class="header">로고, 웹사이트 제목</div>
    <div class="nav">메인 메뉴바</div>
    <div class="main-content">페이지 핵심 본문</div>
    <div class="footer">저작권, 하단 정보</div>

    <!-- 
      =========================
      올바른 예시 
      =========================
      태그 이름만 봐도 각 구역의 역할이 확실하게 보이는 완벽한 마크업 구조 
    -->

    <header>로고, 웹사이트 제목</header>
    <nav>메인 메뉴바</nav>
    <main>페이지 핵심 본문</main>
    <footer>저작권, 하단 정보</footer>
  </body>
</html>

  <body>
    <header>
      <h1>국어사전</h1>
    </header>
    <main>
      <section>
        <h2>주제별 보기</h2>
        <form action="">
          <fieldset>
            <legend>자음</legend>

            <label> <input type="radio" name="consonant" value="G/K" /> ㄱ </label>
            <label> <input type="radio" name="consonant" value="N" /> ㄴ </label>
            <label> <input type="radio" name="consonant" value="D/T" /> ㄷ </label>
            <label> <input type="radio" name="consonant" value="R/L" /> ㄹ </label>
            <label> <input type="radio" name="consonant" value="M" /> ㅁ </label>
            <label> <input type="radio" name="consonant" value="B/P" /> ㅂ </label>
            <label> <input type="radio" name="consonant" value="S" /> ㅅ </label>
            <label> <input type="radio" name="consonant" value="Ng" /> ㅇ </label>
            <label> <input type="radio" name="consonant" value="J" /> ㅈ </label>
            <label> <input type="radio" name="consonant" value="ch" /> ㅊ </label>
            <label> <input type="radio" name="consonant" value="K" /> ㅋ </label>
            <label> <input type="radio" name="consonant" value="T" /> ㅌ </label>
            <label> <input type="radio" name="consonant" value="P" /> ㅍ </label>
            <label> <input type="radio" name="consonant" value="H" /> ㅎ </label>
          </fieldset>
          <fieldset>
            <legend>모음</legend>

            <label> <input type="radio" name="vowel" value="a" /> ㅏ </label>
            <label> <input type="radio" name="vowel" value="ya" /> ㅑ </label>
            <label> <input type="radio" name="vowel" value="eo" /> ㅓ </label>
            <label> <input type="radio" name="vowel" value="yeo" /> ㅕ </label>
            <label> <input type="radio" name="vowel" value="o" /> ㅗ </label>
            <label> <input type="radio" name="vowel" value="yo" /> ㅛ </label>
            <label> <input type="radio" name="vowel" value="u" /> ㅜ </label>
            <label> <input type="radio" name="vowel" value="yu" /> ㅠ </label>
            <label> <input type="radio" name="vowel" value="eu" /> ㅡ </label>
            <label> <input type="radio" name="vowel" value="i" /> ㅣ </label>
          </fieldset>
        </form>
      </section>
      <section>
        <h2><strong>옛말, 가,</strong>258건</h2>
        <dl>
          <dt><a href="#">가-족의</a></dt>
          <dd>
            <ol>
              <li>'가조기'의 옛말.</li>
            </ol>
            <p><small>출처: 우리말샘</small></p>
          </dd>
          <dt><a href="#">가각-ㅎㆍ다</a></dt>
          <dd>
            <ol>
              <li>'급하다'의 옛말.</li>
            </ol>
            <p><small>출처: 우리말샘</small></p>
          </dd>
          <dt><a href="#">가개</a></dt>
          <dd>
            <ol>
              <li>허름하게 대강 얽어 지은 집.</li>
            </ol>
            <p><small>출처: 우리말샘</small></p>
          </dd>
          <dt><a href="#">가닭</a></dt>
          <dd>
            <ol>
              <li>'가닥'의 옛말.</li>
            </ol>
            <p><small>출처: 우리말샘</small></p>
          </dd>
        </dl>
      </section>

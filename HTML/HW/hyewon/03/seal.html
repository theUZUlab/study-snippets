<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Villainess Seal</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <div class="page-wrapper">
        <header class="header">
          <h1 class="sr-only">Berry Rosencreutz</h1>
          <a href="berry_portfolio.html">
            <img
              class="header__logo"
              src="assets/crest_transparent.png"
              alt="Crest Transparent"
            />
          </a>
          <nav>
            <ul class="nav__list">
              <li><a href="portrait.html">Portrait</a></li>
              <li><a href="eminence.html">Eminence</a></li>
              <li><a href="requiem.html">Requiem</a></li>
              <li><a href="indulgence.html">Indulgence</a></li>
              <li><a href="seal.html">Seal</a></li>
            </ul>
          </nav>
        </header>
        <main>
          <h2>Seal</h2>
          <form action="" class="seal-form">
            <div class="seal-form__field">
              <label for="visitor_name" class="seal-form__label">Name</label>
              <input
                type="text"
                id="visitor_name"
                class="seal-form__input"
                placeholder="내 혀끝에 올리기조차 구차한 이름이지만, 정 들이밀겠다면 말리진 않겠어."
              />
            </div>
            <div class="seal-form__field">
              <label for="visitor_house" class="seal-form__label">House</label>
              <input
                type="text"
                id="visitor_house"
                class="seal-form__input"
                placeholder="그런 하찮은 가문의 이름으로 내게 서신을 보낸다고? 배짱 하나는 가상하네."
              />
            </div>
            <div class="seal-form__field">
              <label for="visit_purpose" class="seal-form__label"
                >Purpose</label
              >
              <textarea
                name=""
                id="visit_purpose"
                class="seal-form__textarea"
                placeholder="그래, 그 가상한 용기로 대체 무슨 헛소리를 지껄일 셈인지 어디 한번 감상이나 해줄게."
              ></textarea>
            </div>
            <button>완료</button>
          </form>
        </main>
      </div>
      <footer class="footer">
        <img
          class="footer__logo"
          src="assets/crest_wax_seal.png"
          alt="Crest Wax Seal"
        />
        <div class="footer__contact">
          <p>
            <strong>마법 통신구</strong> |
            <a href="mailto:202521005@chu.ac.kr">b_elladonna@empire.com</a>
          </p>
          <p>
            <strong>지하 정보 길드 '적월'</strong> |
            <a href="https://github.com/hye-wonn">GitHub (@amaranth_veil)</a>
          </p>
        </div>
      </footer>
    </div>
  </body>
</html>

<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>자신의 인적사항 들어간 포토폴리오 만들기</title>
    <!-- ㅋ 포트폴리오죠? -->
  </head>
  <body>
    <h1>포토폴리오</h1>
    <!-- ㅋ 포트폴리오죠? -->
    <hr />

    <h2>이름:양예지</h2>
    <h2>나이:22세</h2>
    <!-- 
      제목(h2) 태그를 일반 데이터 내용(이름, 나이)을 적는 데에 써버렸음
      h2는 글씨를 키우는 태그가 아니라 책의 '단원 제목'을 잡아주는 뼈대 태그임
      "이름:양예지" 자체가 단원 제목이 되는 건 시맨틱(의미론적) 마크업 관점에서 아주 어색함 스크린 리더기도 이걸 '제목'으로 강조해서 읽어버려서 듣는 사람이 혼란스러워함
      모범 답안: 제목은 하나로 묶어 따로 빼고, 내용은 p 태그나 사전형 목록(dl, dt, dd)을 쓰는 게 정석
        <h2>기본 정보</h2>
        <p><strong>이름:</strong> 양예지</p>
        <p><strong>나이:</strong> 22세</p>
    -->

    <img src="./나의어릴적사진.jpg" alt="나의 어릴 적 사진" width="150" />
    <p>위 사진은 <em>저의 어릴 적</em> 사진입니다</p>
    <!-- 
      width="150" 속성도 작동은 잘 되지만, 요즘 실무에선 크기 조절은 무조건 CSS한테 맡기는 추세 
    -->
    <hr />

    <h3>거주 지역: 제주시</h3>
    <!-- 
      여기도 위랑 똑같이 h3 태그를 내용 적는 데 썼음
      <p>거주 지역: 제주시</p> 로 수정 필요 
    -->

    <h3>출신학교</h3>
    <ul>
      <li>초등학교:이도초등학교</li>
      <li>중학교:제주아라중학교</li>
      <li>고등학교:제주중앙여자고등학교</li>
    </ul>

    <h3>취미</h3>
    <ol>
      <li>낮잠자기</li>
      <li>덕질하기</li>
    </ol>

    <hr />
    <h3>이번 스터디를 통한 다짐</h3>
    <p>
      지금은 아무것도 모르지만 조금이라도 더 알아가기 위해서 더
      <strong>열심히</strong> 스터디에 참여를 하겠습니다.
    </p>
    <br />

    <a href="https://www.uzu-dev.kr/">스승님의 블로그</a>
  </body>
</html>
